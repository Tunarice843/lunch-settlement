<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>점심식대 정산</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍱</text></svg>">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f3f4f6; --card: #ffffff; --pri: #2563eb; --pri-d: #1d4ed8;
    --txt: #1f2937; --mut: #6b7280; --line: #e5e7eb; --ok: #16a34a;
    --warn: #dc2626; --warn-bg: #fef2f2;
  }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--txt); font-size: 16px; line-height: 1.5;
    max-width: 560px; margin: 0 auto; min-height: 100vh; position: relative;
  }
  header {
    background: var(--pri); color: #fff; padding: 14px 16px; position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 6px rgba(0,0,0,.12);
  }
  header h1 { font-size: 18px; margin: 0; flex: 1; }
  header button {
    background: rgba(255,255,255,.18); color: #fff; border: none; border-radius: 8px;
    padding: 7px 11px; font-size: 14px; font-weight: 600;
  }
  main { padding: 16px; padding-bottom: 90px; }
  .card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .card h2 { font-size: 16px; margin: 0 0 12px; }
  .muted { color: var(--mut); font-size: 14px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .between { justify-content: space-between; }
  label.fld { display: block; font-size: 13px; font-weight: 600; color: var(--mut); margin: 10px 0 4px; }
  input[type=text], input[type=password], input[type=number], input[type=date], select {
    width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 10px;
    font-size: 16px; background: #fff; color: var(--txt);
  }
  .btn {
    display: block; width: 100%; border: none; border-radius: 12px; padding: 14px;
    font-size: 16px; font-weight: 700; background: var(--pri); color: #fff; margin-top: 10px;
  }
  .btn:active { background: var(--pri-d); }
  .btn.sec { background: #e5e7eb; color: var(--txt); }
  .btn.ok { background: var(--ok); }
  .btn.danger { background: var(--warn); }
  .btn.sm { padding: 10px; font-size: 14px; margin-top: 0; }
  .btn:disabled { opacity: .5; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .hidden { display: none !important; }
  .chip {
    display: inline-flex; align-items: center; justify-content: center; padding: 9px 6px;
    border: 1.5px solid var(--line); border-radius: 10px; font-size: 14px; font-weight: 600;
    background: #fff; color: var(--txt); text-align: center; cursor: pointer; user-select: none;
  }
  .chip.on { background: var(--pri); color: #fff; border-color: var(--pri); }
  .chip.all.on { background: var(--ok); border-color: var(--ok); }
  .member-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .bal-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .bal-row:last-child { border-bottom: none; }
  .bal-name { font-weight: 600; }
  .bal-amt { font-weight: 700; font-variant-numeric: tabular-nums; }
  .total-amt { font-size: 26px; font-weight: 800; color: var(--pri); }
  .item-card { border: 1px solid var(--line); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
  .item-head { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 8px; }
  .item-price { color: var(--pri); font-variant-numeric: tabular-nums; }
  .preview { width: 100%; border-radius: 12px; margin-top: 10px; max-height: 360px; object-fit: contain; background: #000; }
  .rec { border-bottom: 1px solid var(--line); padding: 12px 0; }
  .rec:last-child { border-bottom: none; }
  .rec-head { display: flex; justify-content: space-between; font-weight: 600; }
  .rec-sub { font-size: 13px; color: var(--mut); margin-top: 3px; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 999px; font-weight: 700; }
  .badge.settled { background: #e5e7eb; color: var(--mut); }
  .badge.open { background: #dbeafe; color: var(--pri-d); }
  .badge.n1 { background: #dcfce7; color: #15803d; }
  .badge.item { background: #fef3c7; color: #b45309; }
  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: #fff; border-radius: 16px; padding: 20px; max-width: 420px; width: 100%; max-height: 86vh; overflow: auto; }
  .modal h3 { margin: 0 0 8px; font-size: 18px; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #111827; color: #fff;
    padding: 11px 18px; border-radius: 999px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .2s;
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: .96; }
  .summary-box { background: #f9fafb; border: 1px dashed var(--line); border-radius: 10px; padding: 12px; font-size: 14px; white-space: pre-wrap; font-variant-numeric: tabular-nums; }
  .spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .center { text-align: center; }
  .small { font-size: 13px; }
</style>
</head>
<body>
<header>
  <span style="font-size:20px">🍱</span>
  <h1>점심식대 정산</h1>
  <button id="btnSettings">설정</button>
</header>

<main id="main"></main>

<div id="toast" class="toast"></div>
<div id="modalRoot"></div>

<script>
"use strict";

/* ===================== 저장소 / 상태 ===================== */
const CFG_KEY = "lunch_config_v1";
const REC_KEY = "lunch_records_v1";

const MAX_MEMBERS = 8;            // 슬롯은 8개까지. 이름이 비면 미사용(숨김)
const DEFAULT_CFG = {
  members: ["팀원1", "팀원2", "팀원3", "팀원4", "팀원5", "", "", ""],
  provider: "gemini",            // gemini | openai | claude
  apiKey: "",
  model: ""                       // 비우면 기본 모델 사용
};
const DEFAULT_MODELS = { gemini: "gemini-2.5-flash", openai: "gpt-4o", claude: "claude-sonnet-4-6" };

function loadCfg() {
  let c;
  try { c = Object.assign({}, DEFAULT_CFG, JSON.parse(localStorage.getItem(CFG_KEY) || "{}")); }
  catch { c = Object.assign({}, DEFAULT_CFG); }
  // 슬롯 수를 MAX_MEMBERS로 맞춤(기존 5명 설정도 8칸으로 확장)
  c.members = (c.members || []).slice(0, MAX_MEMBERS);
  while (c.members.length < MAX_MEMBERS) c.members.push("");
  return c;
}
function saveCfg(c) { localStorage.setItem(CFG_KEY, JSON.stringify(c)); }
function loadRecords() {
  try { return JSON.parse(localStorage.getItem(REC_KEY) || "[]"); } catch { return []; }
}
function saveRecords(r) { localStorage.setItem(REC_KEY, JSON.stringify(r)); }
// 정산 배치(수금관리용 스냅샷): [{ id, date, createdAt, entries:[{ i, amount, paid, paidAt }] }]
const BATCH_KEY = "lunch_batches_v1";
function loadBatches() {
  try { return JSON.parse(localStorage.getItem(BATCH_KEY) || "[]"); } catch { return []; }
}
function saveBatches(b) { localStorage.setItem(BATCH_KEY, JSON.stringify(b)); }

let cfg = loadCfg();
// 진행 중인 영수증 작업 상태
let draft = null; // { imageDataUrl, base64, mime, store, date, items:[{name,price}], total }

/* ===================== 유틸 ===================== */
const $ = (id) => document.getElementById(id);
const won = (n) => Math.round(n).toLocaleString("ko-KR") + "원";
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };

function toast(msg) {
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), 2200);
}

// 금액을 ids 인원에게 분할. 각자 100원 단위로 내고, 남는 금액은 첫 번째 사람(ids[0])이 부담. { id: 금액 } 반환
const SPLIT_UNIT = 100;
function splitEven(amount, ids) {
  const out = {}; const n = ids.length;
  if (n === 0) return out;
  amount = Math.round(amount);
  const others = Math.floor((amount / n) / SPLIT_UNIT) * SPLIT_UNIT;  // 나머지 인원: 100원 단위로 내림
  ids.forEach(id => { out[id] = others; });
  out[ids[0]] = amount - others * (n - 1);                            // 첫 번째 사람이 나머지(잔돈 포함) 부담
  return out;
}

function memberName(i) { return (cfg.members[i] && cfg.members[i].trim()) || `팀원${i + 1}`; }
// 이름이 입력된(사용 중인) 팀원 인덱스만
function activeIndices() { return cfg.members.map((m, i) => i).filter(i => (cfg.members[i] || "").trim() !== ""); }
// 특정 기록에서 팀원 i가 정산 완료됐는지(팀원별 정산). r.settled(레거시: 전체정산)도 인정.
function isSettled(r, i) { return !!r.settled || (Array.isArray(r.settledMembers) && r.settledMembers.includes(i)); }
// 기록에 아직 미정산인 팀원이 한 명이라도 있나
function recHasOpen(r) { return Object.keys(r.splits).some(k => !isSettled(r, +k)); }
// 합계 표시용: 사용 중인 팀원 + 미정산 금액이 남은 인덱스(이름을 지워도 잔액은 보이도록)
function displayIndices() {
  const set = new Set(activeIndices());
  loadRecords().forEach(r => { for (const k in r.splits) if (!isSettled(r, +k)) set.add(+k); });
  return [...set].sort((a, b) => a - b);
}

/* ===================== 모달 / 확인 ===================== */
function closeModal() { $("modalRoot").innerHTML = ""; }
function confirmDialog(title, body, okLabel, onOk, danger) {
  $("modalRoot").innerHTML = `
    <div class="overlay" id="ov">
      <div class="modal">
        <h3>${esc(title)}</h3>
        <div class="muted" style="margin-bottom:16px">${body}</div>
        <button class="btn ${danger ? "danger" : ""}" id="mOk">${esc(okLabel)}</button>
        <button class="btn sec" id="mCancel">취소</button>
      </div>
    </div>`;
  $("mCancel").onclick = closeModal;
  $("ov").onclick = (e) => { if (e.target.id === "ov") closeModal(); };
  $("mOk").onclick = () => { closeModal(); onOk(); };
}

/* ===================== 홈 화면 ===================== */
function balancesByMember() {
  const bal = cfg.members.map(() => 0);
  loadRecords().forEach(r => { for (const k in r.splits) if (!isSettled(r, +k)) bal[+k] += r.splits[k]; });
  return bal;
}

function renderHome() {
  draft = null;
  const bal = balancesByMember();
  const grand = bal.reduce((a, b) => a + b, 0);
  const openCount = loadRecords().filter(recHasOpen).length;
  const needSetup = !cfg.apiKey;

  $("main").innerHTML = `
    ${needSetup ? `<div class="card" style="border:1px solid #fde68a;background:#fffbeb">
      <b>⚠ 설정이 필요합니다</b>
      <div class="muted" style="margin-top:6px">영수증 해독을 위해 AI API 키를 등록하세요.</div>
      <button class="btn sm" style="margin-top:10px" onclick="openSettings()">설정 열기</button>
    </div>` : ""}

    <div class="card">
      <div class="row between"><h2 style="margin:0">현재 미정산 합계</h2>
        <span class="badge open">${openCount}건</span></div>
      <div class="total-amt" style="margin:8px 0 14px">${won(grand)}</div>
      <div>
        ${displayIndices().map(i => `<div class="bal-row"><span class="bal-name">${esc(memberName(i))}</span><span class="bal-amt">${won(bal[i] || 0)}</span></div>`).join("")}
      </div>
      <button class="btn ok" style="margin-top:14px" onclick="doSettle()" ${grand > 0 ? "" : "disabled"}>✅ 정산 수행 (금액 확정)</button>
    </div>

    <button class="btn" onclick="startReceipt()">📷 영수증 추가</button>
    <button class="btn sec" onclick="renderHistory()">📒 내역 보기</button>
    <button class="btn sec" onclick="renderCollections()">💰 수금관리</button>
  `;
}

// 일괄 정산: 현재 미정산 금액을 팀원별로 스냅샷 → 수금관리에 기록하고, 미정산 합계는 0으로 초기화
function doSettle() {
  const bal = balancesByMember();
  const entries = displayIndices().map(i => ({ i, amount: bal[i] || 0 })).filter(e => e.amount > 0);
  if (entries.length === 0) { toast("정산할 미정산 금액이 없습니다"); return; }
  const grand = entries.reduce((a, e) => a + e.amount, 0);
  confirmDialog("정산 수행",
    `현재 미정산 합계 <b>${won(grand)}</b>을 이 시점 금액으로 확정합니다.<br>· 팀원별 금액이 <b>수금관리</b>에 기록됩니다.<br>· 미정산 합계는 <b>0원으로 초기화</b>되고, 이후 점심은 새로 쌓입니다.<br>· 입금 여부는 수금관리에서 따로 확인합니다.`,
    "정산 수행", () => {
      // 1) 현재 미정산 건들을 정산 처리(=배치에 포함)
      const recs = loadRecords();
      const batchId = "s" + Date.now() + Math.floor(Math.random() * 1000);
      recs.forEach(r => {
        Object.keys(r.splits).forEach(k => {
          const i = +k;
          if (isSettled(r, i)) return;
          r.settledMembers = r.settledMembers || [];
          if (!r.settledMembers.includes(i)) r.settledMembers.push(i);
        });
        if (Object.keys(r.splits).every(k => isSettled(r, +k))) { r.settled = true; r.settledBatch = r.settledBatch || batchId; }
      });
      saveRecords(recs);
      // 2) 스냅샷 배치 저장
      const batches = loadBatches();
      batches.push({ id: batchId, date: todayStr(), createdAt: new Date().toISOString(), entries: entries.map(e => ({ i: e.i, amount: e.amount, paid: false, paidAt: null })) });
      saveBatches(batches);
      toast("정산 완료 — 수금관리에 기록되었습니다");
      renderHome();
    });
}

/* ===================== 수금관리 ===================== */
function renderCollections() {
  const batches = loadBatches().slice().sort((a, b) =>
    (a.date < b.date ? 1 : a.date > b.date ? -1 : (a.createdAt < b.createdAt ? 1 : -1)));  // 날짜 역순(최근이 위)
  const card = (b) => {
    const total = b.entries.reduce((a, e) => a + e.amount, 0);
    const unpaid = b.entries.filter(e => !e.paid);
    const collected = total - unpaid.reduce((a, e) => a + e.amount, 0);
    const allPaid = unpaid.length === 0;
    const rows = b.entries.slice().sort((x, y) => x.i - y.i).map(e => `
      <div class="bal-row">
        <span class="bal-name">${esc(memberName(e.i))}</span>
        <span class="row" style="gap:12px">
          <span class="bal-amt">${won(e.amount)}</span>
          ${e.paid
            ? `<span class="badge settled">입금완료 ✓</span>`
            : `<button class="btn ok" style="width:auto;margin:0;padding:6px 14px;font-size:13px" onclick="confirmDeposit('${b.id}',${e.i})">입금확인</button>`}
        </span>
      </div>`).join("");
    return `
      <div class="card">
        <div class="row between">
          <h2 style="margin:0">정산일 ${esc(b.date)}</h2>
          <span class="badge ${allPaid ? "settled" : "open"}">${allPaid ? "수금완료" : `미수금 ${unpaid.length}명`}</span>
        </div>
        <div class="muted small" style="margin:4px 0 10px">정산액 ${won(total)} · 수금 ${won(collected)} / 미수 ${won(total - collected)}</div>
        ${rows}
      </div>`;
  };
  $("main").innerHTML = `
    ${batches.length
      ? batches.map(card).join("")
      : '<div class="card"><h2>수금관리</h2><p class="muted">아직 정산 내역이 없습니다. 홈에서 <b>정산 수행</b>을 하면 여기에 팀원별 금액이 기록됩니다.</p></div>'}
    <button class="btn sec" onclick="renderHome()">← 홈으로</button>
  `;
}

function confirmDeposit(batchId, i) {
  const b = loadBatches().find(x => x.id === batchId);
  const e = b && b.entries.find(x => x.i === i);
  if (!e || e.paid) return;
  confirmDialog(`${memberName(i)} 입금확인`,
    `<b>${esc(memberName(i))}</b>님의 정산액 <b>${won(e.amount)}</b> 입금을 확인 처리합니다.`,
    "입금완료", () => {
      const batches = loadBatches();
      const bb = batches.find(x => x.id === batchId);
      const ee = bb && bb.entries.find(x => x.i === i);
      if (!ee) return;
      ee.paid = true; ee.paidAt = new Date().toISOString();
      saveBatches(batches);
      toast(`${memberName(i)} 입금완료`);
      renderCollections();
    });
}

/* ===================== 영수증 추가: 이미지 입력 ===================== */
function startReceipt() {
  if (!cfg.apiKey) { toast("먼저 설정에서 API 키를 등록하세요"); openSettings(); return; }
  draft = null;
  $("main").innerHTML = `
    <div class="card">
      <h2>영수증 등록</h2>
      <p class="muted">실물 영수증을 촬영하거나, 저장된 이미지를 업로드하세요.</p>
      <input type="file" id="fileCam" accept="image/*" capture="environment" class="hidden">
      <input type="file" id="fileUp" accept="image/*" class="hidden">
      <button class="btn" onclick="$('fileCam').click()">📷 카메라로 촬영</button>
      <button class="btn sec" onclick="$('fileUp').click()">🖼️ 이미지 업로드</button>
      <img id="preview" class="preview hidden" alt="미리보기">
      <button class="btn ok hidden" id="btnAnalyze" onclick="analyze()">🔍 영수증 분석</button>
      <button class="btn sec sm" style="margin-top:14px" onclick="renderHome()">← 홈으로</button>
    </div>
  `;
  $("fileCam").onchange = (e) => onImage(e.target.files[0]);
  $("fileUp").onchange = (e) => onImage(e.target.files[0]);
}

function onImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const dataUrl = reader.result;
    draft = { imageDataUrl: dataUrl, base64: dataUrl.split(",")[1], mime: file.type || "image/jpeg" };
    const img = $("preview"); img.src = dataUrl; img.classList.remove("hidden");
    $("btnAnalyze").classList.remove("hidden");
  };
  reader.readAsDataURL(file);
}

/* ===================== AI Vision 호출 ===================== */
const VISION_PROMPT =
  "이 이미지는 한국 식당의 영수증입니다. 메뉴 항목과 수량, 금액을 추출해 아래 JSON 형식으로만 답하세요. " +
  "설명/마크다운 없이 순수 JSON만 출력합니다.\n" +
  '{"store":"상점명 또는 빈문자열","date":"YYYY-MM-DD(없으면 빈문자열)",' +
  '"items":[{"name":"메뉴명","qty":수량숫자(없으면 1),"price":숫자}],"total":숫자}\n' +
  "규칙: items에는 실제 주문 메뉴만 넣습니다. 소계/합계/부가세/봉사료/할인/카드승인/잔돈 등은 제외. " +
  "qty는 그 메뉴의 주문 수량입니다. price는 그 줄의 합계 금액(단가×수량)으로 넣습니다(수량이 2 이상이면 단가가 아니라 합계). " +
  "price·qty·total은 숫자만(쉼표·원 표시 없이).";

async function analyze() {
  if (!draft || !draft.base64) { toast("이미지를 먼저 선택하세요"); return; }
  const btn = $("btnAnalyze");
  btn.disabled = true; btn.innerHTML = '<div class="row" style="justify-content:center"><div class="spinner"></div>&nbsp;분석 중...</div>';
  try {
    const data = await callVision(draft.base64, draft.mime);
    draft.store = data.store || "";
    draft.date = (data.date && /^\d{4}-\d{2}-\d{2}$/.test(data.date)) ? data.date : todayStr();
    draft.items = (data.items || []).filter(it => it && it.name).map(it => ({ name: String(it.name), qty: Math.max(1, Math.round(Number(it.qty) || 1)), price: Math.max(0, Math.round(Number(it.price) || 0)) }));
    const sum = draft.items.reduce((a, it) => a + it.price, 0);
    draft.total = Math.round(Number(data.total) || 0) || sum;
    if (draft.items.length === 0) { toast("메뉴를 인식하지 못했습니다. 직접 입력하세요."); }
    renderReview();
  } catch (err) {
    console.error(err);
    confirmDialog("분석 실패", "AI 응답을 받지 못했습니다.<br><span class='small'>" + esc(err.message) + "</span><br><br>직접 입력으로 진행할까요?", "직접 입력", () => {
      draft.store = ""; draft.date = todayStr(); draft.items = []; draft.total = 0; renderReview();
    });
  } finally {
    btn.disabled = false; btn.innerHTML = "🔍 영수증 분석";
  }
}

async function callVision(base64, mime) {
  const provider = cfg.provider;
  const model = cfg.model || DEFAULT_MODELS[provider];
  let text;
  if (provider === "gemini") {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(cfg.apiKey)}`;
    const res = await fetch(url, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: VISION_PROMPT }, { inline_data: { mime_type: mime, data: base64 } }] }],
        generationConfig: { responseMimeType: "application/json", temperature: 0 }
      })
    });
    if (!res.ok) throw new Error("Gemini " + res.status + ": " + (await res.text()).slice(0, 200));
    const j = await res.json();
    text = j.candidates?.[0]?.content?.parts?.map(p => p.text).join("") || "";
  } else if (provider === "openai") {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + cfg.apiKey },
      body: JSON.stringify({
        model, temperature: 0, response_format: { type: "json_object" },
        messages: [{ role: "user", content: [
          { type: "text", text: VISION_PROMPT },
          { type: "image_url", image_url: { url: `data:${mime};base64,${base64}` } }
        ] }]
      })
    });
    if (!res.ok) throw new Error("OpenAI " + res.status + ": " + (await res.text()).slice(0, 200));
    const j = await res.json();
    text = j.choices?.[0]?.message?.content || "";
  } else { // claude
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json", "x-api-key": cfg.apiKey,
        "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model, max_tokens: 1500,
        messages: [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: mime, data: base64 } },
          { type: "text", text: VISION_PROMPT }
        ] }]
      })
    });
    if (!res.ok) throw new Error("Claude " + res.status + ": " + (await res.text()).slice(0, 200));
    const j = await res.json();
    text = j.content?.map(c => c.text).join("") || "";
  }
  return parseJsonLoose(text);
}

function parseJsonLoose(text) {
  if (!text) throw new Error("빈 응답");
  let t = text.trim().replace(/^```(json)?/i, "").replace(/```$/, "").trim();
  try { return JSON.parse(t); } catch {}
  const m = t.match(/\{[\s\S]*\}/);
  if (m) { try { return JSON.parse(m[0]); } catch {} }
  throw new Error("JSON 파싱 실패");
}

function refreshSum() {
  const sum = draft.items.reduce((a, x) => a + (+x.price || 0), 0);

  hint.style.color = sum !== draft.total ? "var(--warn)" : "var(--ok)";
}

/* ===================== 질문 ①: 1/N 정산인가요? ===================== */

/* ===================== ① 예: 인원 체크 → 균등 분할 ===================== */
let n1Selected = new Set();
function render1N() {
  n1Selected = new Set();

    <div class="card">
      <h2>오늘 점심 인원은?</h2>
      <p class="muted">함께 먹은 팀원을 모두 선택하세요. 총 ${won(draft.total)}을 균등 분할합니다.</p>

function toggleN1(i) {

function updateN1Hint() {

function saveN1() {
  if (n1Selected.size === 0) { toast("인원을 선택하세요"); return; }

/* ===================== ② 아니오: 품목별 배정 ===================== */
// 각 항목: assign = Set(멤버index) 또는 everyone=true
let itemAssign = [];
function renderItemAssign() {
  itemAssign = draft.items.map(() => ({ everyone: false, members: new Set() }));
  drawItemAssign();
}
function drawItemAssign() {
  const lunchers = computeLunchers();
  const html = draft.items.map((it, idx) => {
    const a = itemAssign[idx];
    const qty = it.qty || 1;
    const chips = activeIndices().map(i =>
      `<div class="chip ${a.members.has(i) && !a.everyone ? "on" : ""}" onclick="toggleItemMember(${idx},${i})">${esc(memberName(i))}</div>`
    ).join("");
    const count = a.everyone ? lunchers.length : a.members.size;
    const qtyMismatch = !a.everyone && qty > 1 && a.members.size !== qty;
    let hint, warn = false;
    if (count > 0) {
      hint = `선택 ${count}명 · 1인당 약 ${won(it.price / count)}`;
      if (qtyMismatch) { hint += `  ⚠ 수량 ${qty}인분인데 ${a.members.size}명 선택됨`; warn = true; }
    } else { hint = "먹은 팀원을 선택하세요 (여러 명 선택 가능)"; }
    return `
      <div class="item-card">
        <div class="item-head">
          <span>${esc(it.name || "(이름없음)")}${qty > 1 ? ` <span class="badge item">×${qty}</span>` : ""}</span>
          <span class="item-price">${won(it.price)}</span>
        </div>
        <div class="member-grid">
          ${chips}
          <div class="chip all ${a.everyone ? "on" : ""}" onclick="toggleItemEveryone(${idx})">전원</div>
        </div>
        <div class="small" style="margin-top:8px;${warn ? "color:var(--warn);font-weight:600" : "color:var(--mut)"}">${hint}</div>
      </div>`;
  }).join("");
  $("main").innerHTML = `
    <div class="card">
      <h2>품목별 배정</h2>
      <p class="muted">각 메뉴를 먹은 팀원을 <b>여러 명까지</b> 선택할 수 있습니다. 같은 메뉴를 2명 이상이 먹어 수량이 <b>×2·×3</b>이면 그 인원을 모두 선택하면 합계 금액이 자동으로 나눠집니다.<br>
      <b>전원</b> = 점심 먹은 인원수로 분할(공유 사이드 메뉴용).</p>
      ${html || '<p class="muted">항목이 없습니다.</p>'}
      <div class="summary-box small" id="assignPreview" style="margin-top:6px"></div>
      <button class="btn ok" onclick="saveItemAssign()">저장</button>
      <button class="btn sec sm" style="margin-top:10px" onclick="renderReview()">← 뒤로</button>
    </div>`;
  updateAssignPreview();
}
function toggleItemMember(idx, i) {
  const a = itemAssign[idx];
  a.everyone = false;
  if (a.members.has(i)) a.members.delete(i); else a.members.add(i);
  drawItemAssign();
}
function toggleItemEveryone(idx) {
  const a = itemAssign[idx];
  a.everyone = !a.everyone;
  if (a.everyone) a.members.clear();
  drawItemAssign();
}
// 점심 먹은 인원 = 개별 배정된 멤버들의 합집합
function computeLunchers() {
  const set = new Set();
  itemAssign.forEach(a => { if (!a.everyone) a.members.forEach(i => set.add(i)); });
  return [...set].sort((x, y) => x - y);
}
function computeItemSplits() {
  const lunchers = computeLunchers();
  const splits = {};
  const add = (id, amt) => { splits[id] = (splits[id] || 0) + amt; };
  draft.items.forEach((it, idx) => {
    const a = itemAssign[idx];
    let ids;
    if (a.everyone) ids = lunchers;        // 전원 → 점심 먹은 인원수로 분할
    else ids = [...a.members].sort((x, y) => x - y);
    if (ids.length === 0) return;           // 미배정 항목은 건너뜀(검증에서 막음)
    const part = splitEven(it.price, ids.map(String));
    for (const k in part) add(k, part[k]);
  });
  return { splits, lunchers };
}
function updateAssignPreview() {
  const { splits, lunchers } = computeItemSplits();
  const box = $("assignPreview");
  if (!box) return;
  if (lunchers.length === 0) { box.textContent = "개별 메뉴를 먹은 팀원을 먼저 선택하세요."; return; }
  let txt = `점심 인원 ${lunchers.length}명\n`;
  lunchers.forEach(i => { txt += `· ${memberName(i)}: ${won(splits[i] || 0)}\n`; });
  const assigned = Object.values(splits).reduce((a, b) => a + b, 0);
  txt += `합계 ${won(assigned)}`;
  box.textContent = txt;
}
function saveItemAssign() {
  // 검증: 모든 항목에 배정이 있어야 하고, 전원 항목이 있으면 점심 인원이 있어야 함
  const lunchers = computeLunchers();
  for (let idx = 0; idx < draft.items.length; idx++) {
    const a = itemAssign[idx];
    if (a.everyone) { if (lunchers.length === 0) { toast(`'${draft.items[idx].name}'은 전원 분할인데 점심 인원이 없습니다`); return; } }
    else if (a.members.size === 0) { toast(`'${draft.items[idx].name || (idx+1)+"번"}' 항목의 인원을 선택하세요`); return; }
  }
  const { splits } = computeItemSplits();
  if (Object.keys(splits).length === 0) { toast("배정된 인원이 없습니다"); return; }
  commitRecord("item", splits, { lunchers });
}

/* ===================== 기록 저장 ===================== */
function commitRecord(mode, splits, extra) {
  const recs = loadRecords();
  const rec = {
    id: "r" + Date.now() + Math.floor(Math.random() * 1000),
    date: draft.date, store: draft.store, mode,
    items: draft.items.map(x => ({ name: x.name, qty: x.qty || 1, price: x.price })),
    total: draft.total,
    splits, settled: false, settledBatch: null,
    createdAt: new Date().toISOString(),
    extra: extra || {}
  };
  recs.push(rec);
  saveRecords(recs);
  draft = null;
  toast("저장되었습니다");
  renderHome();
}

/* ===================== 내역 보기 ===================== */
function renderHistory() {
  const recs = loadRecords().slice().sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : (a.createdAt < b.createdAt ? 1 : -1)));
  const open = recs.filter(recHasOpen);
  const settled = recs.filter(r => !recHasOpen(r));
  const renderRec = (r) => {
    const keys = Object.keys(r.splits).sort((a,b)=>a-b);
    const parts = keys.map(k => `${memberName(+k)} ${won(r.splits[k])}${isSettled(r, +k) ? " ✓" : ""}`).join(" · ");
    const allSettled = keys.every(k => isSettled(r, +k));
    const noneSettled = keys.every(k => !isSettled(r, +k));
    const stBadge = allSettled ? ["settled", "정산완료"] : noneSettled ? ["open", "미정산"] : ["open", "일부정산"];
    return `<div class="rec">
      <div class="rec-head">
        <span>${esc(r.date)} · ${esc(r.store || "상점미상")}</span>
        <span>${won(r.total)}</span>
      </div>
      <div class="rec-sub">
        <span class="badge ${r.mode === "1/N" ? "n1" : "item"}">${r.mode === "1/N" ? "1/N" : "품목별"}</span>
        <span class="badge ${stBadge[0]}">${stBadge[1]}</span>
        &nbsp;${esc(parts)}
      </div>
      <div style="margin-top:8px"><button class="btn danger sm" style="width:auto;padding:6px 12px" onclick="deleteRecord('${r.id}')">삭제</button></div>
    </div>`;
  };
  $("main").innerHTML = `
    <div class="card">
      <div class="row between"><h2 style="margin:0">미정산 내역</h2><span class="badge open">${open.length}건</span></div>
      ${open.length ? open.map(renderRec).join("") : '<p class="muted">미정산 내역이 없습니다.</p>'}
    </div>
    <div class="card">
      <div class="row between"><h2 style="margin:0">정산 완료 내역</h2><span class="badge settled">${settled.length}건</span></div>
      ${settled.length ? settled.map(renderRec).join("") : '<p class="muted">아직 없습니다.</p>'}
    </div>
    <button class="btn sec sm" onclick="exportCSV('all')">📤 전체 CSV 내보내기</button>
    <button class="btn sec sm" style="margin-top:8px" onclick="exportCSV('open')">📤 미정산만 CSV 내보내기</button>
    <button class="btn danger sm" style="margin-top:8px" onclick="deleteAllRecords()">🗑️ 전체 삭제</button>
    <button class="btn sec sm" style="margin-top:8px" onclick="renderHome()">← 홈으로</button>
  `;
}
function deleteRecord(id) {
  confirmDialog("기록 삭제", "이 기록을 삭제할까요? 되돌릴 수 없습니다.", "삭제", () => {
    saveRecords(loadRecords().filter(r => r.id !== id));
    toast("삭제되었습니다"); renderHistory();

function deleteAllRecords() {
  const cnt = loadRecords().length;

  confirmDialog("전체 삭제", `미정산·정산완료 포함 <b>모든 기록 ${cnt}건</b>이 삭제됩니다.<br>되돌릴 수 없습니다. 계속할까요?`, "전체 삭제", () => {
    saveRecords([]);
    toast("모든 기록을 삭제했습니다"); renderHistory();
  }, true);
}

/* ===================== CSV 내보내기 ===================== */
function csvCell(v) {
  const s = String(v == null ? "" : v);
  return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function exportCSV(scope) {
  let recs = loadRecords();
  if (scope === "open") recs = recs.filter(recHasOpen);
  recs = recs.slice().sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : (a.createdAt < b.createdAt ? -1 : 1)));
  if (recs.length === 0) { toast("내보낼 내역이 없습니다"); return; }
  const rows = [["날짜", "상점", "정산방식", "팀원", "금액", "상태"]];
  recs.forEach(r => {
    Object.keys(r.splits).sort((a, b) => a - b).forEach(k => {
      if (scope === "open" && isSettled(r, +k)) return;  // 미정산 CSV엔 미정산 팀원만
      rows.push([r.date, r.store || "", r.mode === "1/N" ? "1/N" : "품목별", memberName(+k), r.splits[k], isSettled(r, +k) ? "정산완료" : "미정산"]);
    });
  });
  const csv = rows.map(row => row.map(csvCell).join(",")).join("\r\n");
  const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" });  // BOM: 엑셀 한글 깨짐 방지
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `점심식대_${scope === "open" ? "미정산" : "전체"}_${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1500);
  toast("CSV를 내려받았습니다 (다운로드 폴더 확인)");
}

/* ===================== 설정 ===================== */
function openSettings() {
  $("main").innerHTML = `
    <div class="card">
      <h2>설정</h2>
      <label class="fld">팀원 이름 (최대 ${MAX_MEMBERS}명 · 비우면 미사용)</label>
      ${cfg.members.map((m, i) => `<input type="text" style="margin-bottom:8px" value="${esc(m)}" oninput="cfg.members[${i}]=this.value" placeholder="슬롯 ${i+1} (비우면 숨김)">`).join("")}
      <div class="small muted">이름이 입력된 팀원만 선택 화면·합계에 나타납니다. 팀원이 늘면 빈 칸에 이름만 추가하세요.</div>

      <label class="fld">AI 제공자</label>
      <select id="provSel" onchange="cfg.provider=this.value;updateModelPh()">
        <option value="gemini" ${cfg.provider==="gemini"?"selected":""}>Google Gemini (권장)</option>
        <option value="openai" ${cfg.provider==="openai"?"selected":""}>OpenAI (GPT-4o)</option>
        <option value="claude" ${cfg.provider==="claude"?"selected":""}>Anthropic Claude</option>
      </select>

      <label class="fld">API 키</label>
      <input type="password" id="apiKeyInput" value="${esc(cfg.apiKey)}" oninput="cfg.apiKey=this.value" placeholder="API 키 붙여넣기" autocomplete="off">
      <div class="small muted" style="margin-top:4px" id="keyHelp"></div>

      <label class="fld">모델 (선택, 비우면 기본값)</label>
      <input type="text" id="modelInput" value="${esc(cfg.model)}" oninput="cfg.model=this.value">

      <button class="btn ok" onclick="commitSettings()">저장</button>
      <button class="btn sec sm" style="margin-top:10px" onclick="renderHome()">← 홈으로</button>

      <div class="small muted" style="margin-top:16px;border-top:1px solid var(--line);padding-top:12px">
        ⚠ API 키는 이 휴대폰의 브라우저 저장소에만 보관되며 외부로 전송되지 않습니다(영수증 이미지를 해당 AI 서버로 보낼 때만 키가 사용됨). 공용 기기에서는 사용에 주의하세요.
      </div>
    </div>`;
  updateModelPh();
}
function updateModelPh() {
  const p = $("provSel").value;
  $("modelInput").placeholder = "기본: " + DEFAULT_MODELS[p];
  const help = {
    gemini: "발급: aistudio.google.com → 'Get API key'. 무료/유료는 키에 연결된 구글 클라우드 결제 설정에 따라 자동 적용(앱과 무관).",
    openai: "발급: platform.openai.com → API keys (유료, 결제수단 필요).",
    claude: "발급: console.anthropic.com → API Keys (유료)."
  };
  $("keyHelp").textContent = help[p];
}
function commitSettings() {
  cfg.members = cfg.members.map(m => (m || "").trim());   // 빈 칸은 그대로 비워둠(미사용)
  saveCfg(cfg);
  toast("설정이 저장되었습니다");
  renderHome();
}

/* ===================== 시작 ===================== */
$("btnSettings").onclick = openSettings;
renderHome();
</script>
